version: '3.9'

services:
  # ── MongoDB ────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: predictix-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: predictix
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - predictix-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Backend ────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: predictix-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/predictix
      JWT_SECRET: ${JWT_SECRET:-predictix_production_secret_change_me}
      ML_SCRIPTS_PATH: /app/ML
      FRONTEND_URL: http://localhost:80
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/Backend/uploads
    networks:
      - predictix-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: predictix-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - predictix-net

  # ── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: predictix-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - predictix-net
    depends_on:
      - backend

  # ── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: predictix-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-predictix_admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/predictix.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - predictix-net

volumes:
  mongo_data:
  prometheus_data:
  grafana_data:
  uploads_data:

networks:
  predictix-net:
    driver: bridge
